name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build wheel twine

    - name: Build package
      run: |
        python -m build

    - name: Verify package
      run: |
        twine check dist/*

    - name: Extract tag name
      id: tag
      run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

    - name: Create GitHub Release and upload wheel
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ steps.tag.outputs.tag }}
        release_name: ${{ steps.tag.outputs.tag }}
        body: |
          ## Release ${{ steps.tag.outputs.tag }}
          
          Lightweight MCP server bridging Claude Code to Google's Gemini AI.
          
          ### Installation
          ```bash
          pip install gemini-bridge
          ```
          
          ### Usage
          ```bash
          # Add to Claude Code
          claude mcp add gemini-bridge -s user -- uvx gemini-bridge
          ```
          
          See [README.md](README.md) for full documentation.
        draft: false
        prerelease: false
        files: dist/*.whl

    - name: Publish to PyPI
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        # Use Trusted Publishing (no password needed)
        # Configure at: https://pypi.org/manage/project/gemini-bridge/settings/publishing/
        attestations: true
